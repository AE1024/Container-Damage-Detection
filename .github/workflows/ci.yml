name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── BACKEND ────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-placeholder-key-not-used-in-production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      RF_API_KEY: ${{ secrets.RF_API_KEY }}
      RF_MODEL_ID: container-damage-ithvn/1
      RF_SERVER: https://detect.roboflow.com
      RF_SERIAL_MODEL_ID: container-serials/1
      RF_SERVERLESS_URL: https://serverless.roboflow.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall backend -q

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ── FRONTEND ───────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
